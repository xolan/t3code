[tools]
node = "24.14.0"
bun = "1.3.9"

[tasks."setup:specify"]
run = "uv tool install specify-cli --from git+https://github.com/github/spec-kit.git"
description = "Install the specify CLI for spec-driven development"

[tasks."upgrade:specify"]
run = "uv tool install specify-cli --force --from git+https://github.com/github/spec-kit.git"
description = "Force-upgrade the specify CLI to the latest version"
